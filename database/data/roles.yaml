roles:
  - name: Admin
    description: Acceso total al sistema
    guard: web
    permissions:
      - roles.view
      - roles.create
      - roles.update
      - roles.delete
      - roles.assign-permissions
      - users.view
      - users.create
      - users.update
      - users.delete
      - users.deactivate
      - users.reset-password
      - users.invite
      - coordinations.view
      - coordinations.create
      - coordinations.edit
      - coordinations.delete
      - coordinations.assign
      - coordinations.view_history
      - buildings.view
      - buildings.create
      - buildings.update
      - buildings.delete
      - classrooms.view
      - classrooms.create
      - classrooms.update
      - classrooms.delete
      - periods.view
      - periods.create
      - periods.update
      - periods.delete

  - name: Profesor
    description: Gestión de secciones, evaluaciones y recursos propios
    guard: web
    permissions: []

  - name: Estudiante
    description: Acceso a inscripciones, notas y materiales
    guard: web
    permissions: []

  - name: Coordinador de Area
    description: Supervisión académica de un área o departamento
    guard: web
    permissions: []
